function b2h(b){return Array.from(b).map(function(x){return x.toString(16).padStart(2,"0");}).join("");}
function h2b(h){var a=new Uint8Array(h.length/2);for(var i=0;i<a.length;i++)a[i]=parseInt(h.substr(i*2,2),16);return a;}
async function tryKey(raw){
  var key=await crypto.subtle.importKey("raw",raw,"AES-GCM",false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:PAYLOAD.slice(0,12)},key,PAYLOAD.slice(12));
  sessionStorage.setItem("e4e_k",b2h(new Uint8Array(raw.buffer||raw)));
  var html=new TextDecoder().decode(pt);
  document.open();document.write(html);document.close();
}
document.getElementById("f").addEventListener("submit",async function(e){
  e.preventDefault();
  var btn=document.getElementById("go"),err=document.getElementById("err");
  btn.disabled=true;err.textContent="";
  try{
    var pw=document.getElementById("pw").value;
    var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);
    var bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt:SALT,iterations:ITERS,hash:"SHA-256"},km,256);
    await tryKey(new Uint8Array(bits));
  }catch(ex){err.textContent="密码错误 / Wrong password";btn.disabled=false;}
});
(async function(){var k=sessionStorage.getItem("e4e_k");if(!k)return;try{await tryKey(h2b(k));}catch(e){sessionStorage.removeItem("e4e_k");}})();
